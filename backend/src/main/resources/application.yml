server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: city-repair-backend
  main:
    allow-bean-definition-overriding: true

  data:
    redis:
      database: ${REDIS_DATABASE:0}
      host: ${REDIS_HOST:119.91.252.167}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:Redis!!mecs2389@Acc}

  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${DB_HOST:119.91.252.167}:${DB_PORT:3306}/${DB_NAME:city_repair}?useUnicode=true&characterEncoding=utf8&zeroDateTimeBehavior=convertToNull&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME:city_repair}
    password: ${DB_PASSWORD:7RA4PhHFeJcZB46z}
    druid:
      initial-size: ${DB_INITIAL_SIZE:0}
      min-idle: ${DB_MIN_IDLE:0}
      max-active: ${DB_MAX_ACTIVE:20}
      max-wait: 60000
      time-between-eviction-runs-millis: 60000
      min-evictable-idle-time-millis: 300000
      max-evictable-idle-time-millis: 900000
      validation-query: SELECT 1
      test-while-idle: true
      test-on-borrow: false
      test-on-return: false
      web-stat-filter:
        enabled: true
      stat-view-servlet:
        enabled: true
        allow:
        url-pattern: /druid/*
        login-username: ${DRUID_USERNAME:admin}
        login-password: ${DRUID_PASSWORD:123456}
      filter:
        stat:
          enabled: true
          log-slow-sql: true
          slow-sql-millis: 1000
          merge-sql: true
        wall:
          config:
            multi-statement-allow: true

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 100MB

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  mapper-locations: classpath*:mapper/**/*Mapper.xml

jwt:
  secret: ${JWT_SECRET:city-repair-dev-secret-change-me}
  expiration: ${JWT_EXPIRATION:86400000}

file:
  upload:
    path: ${FILE_UPLOAD_PATH:./uploads}
    max-size: 10485760

logging:
  level:
    root: info
    com.cityrepair: info
    org.springframework: info
    org.springframework.security: warn
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{50} - %msg%n"
